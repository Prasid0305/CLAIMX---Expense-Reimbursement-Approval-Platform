spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/claimx_test
    username: claimx_user
    password: claimx_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop #create fresh tables for each test
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

jwt:
  secret: this_is_a_secret_key_for_climax_a_expense_reimbursement_and_approval_26_platform
  expiration: 3600000

logging:
  level:
    com.company.claimx: DEBUG
    org.hibernate.SQL: DEBUG